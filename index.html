<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RDF Viewer</title>
    <link rel="stylesheet" href="./src/view/styles.css" />
  </head>

  <body>
    <div id="notification-container"></div>

    <!-- HEADER -->
    <header class="header">
      <h2>RDF Viewer</h2>
      <div class="form-group">
        <label for="app-language">Language</label>
        <select name="language-select" id="app-language">
          <option value="en">EN</option>
          <option value="cs">CS</option>
        </select>
      </div>
    </header>

    <!-- MAIN APP -->
    <main class="layout-container">
      <section class="section">
        <h1 class="section-title">RDF Viewer</h1>
      </section>

      <!-- ENTITY INPUT + COMPATIBLE PLUGINS -->
      <section class="section section-surface">
        <div class="form-group">
          <div
            title="
Entity IRI is the unique identifier
for the RDF entity you want to view."
            class="flex-wrapper"
          >
            <label class="u-help" for="iri">
              Entity IRI
              <img class="icon" src="./assets/icons/info-icon.svg" />
            </label>
          </div>
          <input type="text" id="iri" placeholder="Enter entity IRI" />
          <small class="error-box u-hidden" id="invalid-iri-error"
            >Invalid IRI</small
          >
        </div>

        <div class="flex-wrapper">
          <div
            title="
Compatible plugins are those 
that support the current entity."
            class="flex-wrapper"
            id="compatible-plugins-wrapper"
          >
            <button id="compatible-plugins-btn">Compatible plugins</button>
            <img class="icon u-help" src="./assets/icons/info-icon.svg" />
          </div>
        </div>
      </section>

      <!-- PLUGIN + LANGUAGE -->
      <section class="section section-surface">
        <div class="form-group">
          <label
            for="choose-plugin"
            class="u-help"
            title="
Plugin sets the way the
entity will be displayed."
          >
            Plugin
            <img class="icon" src="./assets/icons/info-icon.svg" />
          </label>
          <select id="choose-plugin"></select>
        </div>

        <div class="form-group">
          <label
            for="languages"
            class="u-help"
            title="
Define the preferred languages for the 
entity display. The first one is the 
most preferred."
          >
            Languages
            <img class="icon" src="./assets/icons/info-icon.svg" />
          </label>
          <input type="text" id="languages" placeholder="en, cs, fr, ..." />
        </div>

        <div id="buttons">
          <button id="display-btn" class="btn-primary">Display</button>
          <button id="show-config-btn" class="btn-icon">
            <img class="icon" src="./assets/icons/settings-icon.svg" />
          </button>
        </div>
      </section>
    </main>

    <!-- CONFIG MODAL -->
    <dialog id="config-modal">
      <div id="config-content">
        <h1 class="section-title">Configuration</h1>

        <!-- TABS -->
        <div class="tabs">
          <button id="data-sources-tab" class="active">Data Sources</button>
          <button id="plugins-tab">Plugins</button>
        </div>

        <!-- TABS CONTENT -->
        <!-- data sources -->
        <div id="data-sources-tab-content" class="tab-content active">
          <fieldset id="sources-fieldset" class="section">
            <h2
              class="u-help"
              title="
Data Sources are the locations 
from which the RDF data about 
the entity and its properties 
will be retrieved."
            >
              Data Source
              <img class="icon" src="./assets/icons/info-icon.svg" />
            </h2>
            <form id="add-source-form" class="section">
              <div class="form-group">
                <select name="data-source-select" id="data-source-select">
                  <option value="SPARQL">Add SPARQL Endpoint from URL</option>
                  <option value="LOCAL_FILE">Upload File</option>
                  <option value="REMOTE_FILE">Add File from URL</option>
                  <option value="LDP">Add LDP Server from URL</option>
                </select>

                <input
                  type="text"
                  name="url-input"
                  id="data-source-url-input"
                  placeholder="https://example.com/sparql"
                  required
                />

                <input
                  type="file"
                  name="file-input"
                  id="data-source-file-input"
                  accept=".trig, .nq, .nquads, .rdf, .ttl, .turtle, .nt, .ntriples, .n3, .json, .jsonld, .rdfxml, .owl"
                  multiple
                  disabled
                />
              </div>

              <button type="submit" class="btn-primary">
                + Add Data Source
              </button>
            </form>

            <hr />

            <div id="source-list"></div>
          </fieldset>
        </div>
        <!-- plugins -->
        <div id="plugins-tab-content" class="tab-content">
          <fieldset id="plugins-fieldset" class="section">
            <h2
              class="u-help"
              title="
Plugin Module is JavaScript file 
that will register a plugin(s)"
            >
              Plugin Module
              <img class="icon" src="./assets/icons/info-icon.svg" />
            </h2>

            <form id="add-plugin-form" class="section">
              <div class="form-group">
                <select name="plugin-add-type" id="plugin-add-type-select">
                  <option value="url">Remote File</option>
                  <option value="file">Local File</option>
                </select>

                <input
                  type="text"
                  placeholder="https://example.com/plugin.js"
                  id="plugin-add-url-input"
                  name="url-input"
                  required
                />

                <input
                  type="file"
                  name="file-input"
                  id="plugin-add-file-input"
                  accept=".js"
                  multiple
                  disabled
                  required
                />
              </div>

              <button type="submit" class="btn-primary add-plugin">
                + Add Plugin Module
              </button>
            </form>

            <hr />

            <ol id="plugin-list"></ol>
          </fieldset>
        </div>
      </div>
    </dialog>

    <!-- RESULTS -->
    <section id="results" class="layout-container"></section>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
